<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>저장된 카드뉴스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="header-top-row">
        <div>
          <h1>저장된 카드뉴스</h1>
          <p class="header-sub">즐겨찾기한 카드뉴스를 언제든 다시 볼 수 있습니다.</p>
        </div>
        <a class="saved-link" href="index.html">← 메인으로</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="news-grid">
      <h2 class="section-title">저장 목록 <span id="savedCount"></span></h2>
      <div id="savedGrid" class="grid"></div>
    </section>
  </main>

  <div id="slideOverlay" class="slide-overlay" hidden>
    <div class="slide-container">
      <button class="slide-close" onclick="closeSlide()" aria-label="닫기">✕</button>
      <div class="slide-header">
        <h3 id="slideTitle" class="slide-news-title"></h3>
        <button class="slide-save-btn saved" id="slideRemoveBtn" onclick="removeCurrentFromSlide(event)" aria-label="저장 해제">★ 저장 해제</button>
      </div>
      <div class="slide-track-wrap">
        <div id="slideTrack" class="slide-track"></div>
      </div>
      <div class="slide-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevSlide()" aria-label="이전">‹</button>
        <span id="slideIndicator" class="slide-indicator"></span>
        <button class="nav-btn" id="nextBtn" onclick="nextSlide()" aria-label="다음">›</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="saved.js?v=1"></script>
</body>
</html>
