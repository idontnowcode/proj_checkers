<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Digest — 이전 기록</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f5f7; --surface: #fff; --primary: #4f8ef7; --accent: #6c63ff;
      --text: #1a1a2e; --muted: #8a8fa8; --border: #e2e5ec; --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .header { background: var(--text); color: #fff; padding: 16px 20px; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 640px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .back-link { font-size: 13px; color: #aaa; text-decoration: none; }
    .back-link:hover { color: #fff; }
    .content { max-width: 640px; margin: 0 auto; padding: 16px; }
    .date-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .date-btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 16px; text-align: left; font-size: 14px; cursor: pointer; color: var(--text);
      box-shadow: var(--shadow); transition: border-color 0.15s; }
    .date-btn:hover { border-color: var(--primary); }
    .date-btn.active { border-color: var(--primary); background: #eef4ff; font-weight: 600; }
    .tabs { background: var(--surface); border-bottom: 1px solid var(--border); margin-bottom: 12px; border-radius: var(--radius) var(--radius) 0 0; }
    .tabs-inner { display: flex; }
    .tab { flex: 1; padding: 12px 16px; text-align: center; font-size: 14px; font-weight: 500;
      color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
      background: none; border-top: none; border-left: none; border-right: none; transition: all 0.15s; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }
    .card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .source-badge { font-size: 11px; padding: 2px 10px; border-radius: 20px; font-weight: 500; background: #eef2ff; color: var(--accent); }
    .card-date { font-size: 11px; color: var(--muted); }
    .card-title { font-size: 15px; font-weight: 700; line-height: 1.4; margin-bottom: 8px; }
    .card-summary { font-size: 13px; color: #444; line-height: 1.65; }
    .card-keypoint { margin-top: 8px; font-size: 12px; color: var(--accent); background: #f0eeff; border-radius: 6px; padding: 6px 10px; }
    .card-footer { margin-top: 10px; text-align: right; }
    .card-link { font-size: 12px; color: var(--primary); text-decoration: none; }
    .card-link:hover { text-decoration: underline; }
    .state-msg { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  </style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <h1>📁 이전 기록</h1>
    <a class="back-link" href="index.html">← 오늘로 돌아가기</a>
  </div>
</header>

<main class="content">
  <div id="dateSection">
    <p class="section-title">날짜 선택</p>
    <div class="date-list" id="dateList">
      <div class="state-msg">📡 기록 목록 불러오는 중...</div>
    </div>
  </div>
  <div id="articleSection" style="display:none">
    <div id="tabBar" class="tabs"><div class="tabs-inner"></div></div>
    <div id="articleContent"></div>
  </div>
</main>

<script>
let archiveData = null;
let activeTopicKey = null;

async function loadIndex() {
  try {
    const res = await fetch('data/archive-index.json?t=' + Date.now());
    if (!res.ok) throw new Error('no index');
    const dates = await res.json();
    if (!dates.length) throw new Error('empty');
    renderDateList(dates);
  } catch {
    document.getElementById('dateList').innerHTML =
      '<div class="state-msg">📭 저장된 기록이 없습니다.<br><small>GitHub Actions를 한 번 실행하면 기록이 쌓입니다.</small></div>';
  }
}

function renderDateList(dates) {
  document.getElementById('dateList').innerHTML = dates.map(d =>
    `<button class="date-btn" data-date="${escHtml(d)}">${escHtml(d)}</button>`
  ).join('');
}

async function loadDate(date) {
  if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) return;
  document.querySelectorAll('.date-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === date);
  });
  document.getElementById('articleSection').style.display = 'none';
  try {
    const res = await fetch(`data/archive/${date}.json?t=` + Date.now());
    if (!res.ok) throw new Error('not found');
    archiveData = await res.json();
    activeTopicKey = Object.keys(archiveData.topics)[0];
    renderArticles();
    document.getElementById('articleSection').style.display = 'block';
    document.getElementById('articleSection').scrollIntoView({ behavior: 'smooth' });
  } catch {
    document.getElementById('articleContent').innerHTML =
      '<div class="state-msg">❌ 해당 날짜의 데이터를 불러올 수 없습니다.</div>';
    document.getElementById('articleSection').style.display = 'block';
  }
}

function renderArticles() {
  const topicKeys = Object.keys(archiveData.topics);
  const tabsInner = document.querySelector('#tabBar .tabs-inner');
  tabsInner.innerHTML = topicKeys.map(k =>
    `<button class="tab ${k === activeTopicKey ? 'active' : ''}" data-key="${escHtml(k)}">${escHtml(getLabel(k))}</button>`
  ).join('');
  renderCards(activeTopicKey);
}

function switchTab(key) {
  activeTopicKey = key;
  document.querySelectorAll('#tabBar .tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
  renderCards(key);
}

function renderCards(topicKey) {
  const articles = archiveData?.topics?.[topicKey] ?? [];
  const el = document.getElementById('articleContent');
  if (!articles.length) { el.innerHTML = '<div class="state-msg">기사가 없습니다.</div>'; return; }
  el.innerHTML = articles.map(a => `
    <div class="card">
      <div class="card-meta">
        <span class="source-badge">${escHtml(a.source || '뉴스')}</span>
        <span class="card-date">${formatDate(a.pubDate)}</span>
      </div>
      <div class="card-title">${escHtml(a.title)}</div>
      <div class="card-summary">${escHtml(a.summary || a.description?.slice(0,120) || '')}</div>
      ${a.keyPoint ? `<div class="card-keypoint">💡 ${escHtml(a.keyPoint)}</div>` : ''}
      ${a.link ? `<div class="card-footer"><a class="card-link" href="${safeUrl(a.link)}" target="_blank" rel="noopener noreferrer">원문 보기 →</a></div>` : ''}
    </div>
  `).join('');
}

function getLabel(key) {
  return { international: '🌍 국제 정세', ai: '🤖 AI 기술' }[key] ?? key;
}
function formatDate(raw) {
  if (!raw) return '';
  try { const d = new Date(raw); const kst = new Date(d.getTime() + 9*3600000); return kst.toISOString().slice(5,16).replace('T',' '); } catch { return raw.slice(0,10); }
}
function escHtml(s) {
  return (s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function safeUrl(url) {
  try { const u = new URL(url ?? ''); return (u.protocol==='https:'||u.protocol==='http:') ? escHtml(url) : '#'; } catch { return '#'; }
}

document.getElementById('dateList').addEventListener('click', e => {
  const btn = e.target.closest('.date-btn');
  if (btn) loadDate(btn.dataset.date);
});
document.querySelector('#tabBar .tabs-inner').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (btn) switchTab(btn.dataset.key);
});
loadIndex();
</script>
</body>
</html>
